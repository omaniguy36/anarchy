<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anarchy SMP - Match Found</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tungsten:wght@600&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0f1923; /* Valorant Dark Theme */
            color: #ece8e1;
            font-family: 'Oswald', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Initial Start Button & Countdown */
        #pre-screen {
            text-align: center;
            z-index: 10;
        }

        .btn {
            background-color: #ff4655;
            color: white;
            border: none;
            border-bottom: 4px solid #8b2029;
            padding: 15px 40px;
            font-size: 24px;
            font-family: 'Tungsten', sans-serif;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
            letter-spacing: 2px;
            position: relative;
        }

        .btn:hover {
            background-color: #e03e4d;
            transform: translateY(2px);
            border-bottom-width: 2px;
        }

        #countdown-container {
            display: none;
            font-size: 80px;
            font-family: 'Tungsten', sans-serif;
            letter-spacing: 5px;
            color: #ff4655;
            text-shadow: 0 0 20px rgba(255, 70, 85, 0.5);
        }

        /* Match Found Animation */
        #match-found-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 20;
            background: radial-gradient(circle, rgba(255,70,85,0.15) 0%, rgba(15,25,35,1) 80%);
        }

        .match-banner {
            position: relative;
            width: 100%;
            height: 240px;
            background: linear-gradient(90deg, rgba(15,25,35,0) 0%, rgba(255,70,85,0.95) 20%, rgba(255,70,85,1) 50%, rgba(255,70,85,0.95) 80%, rgba(15,25,35,0) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            transform: scaleY(0);
            animation: expandBanner 0.4s forwards cubic-bezier(0.075, 0.82, 0.165, 1);
            overflow: hidden;
            box-shadow: 0 0 50px rgba(255, 70, 85, 0.6);
        }

        /* Valorant Extra Detail Lines */
        .banner-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: #fff;
            opacity: 0.8;
            transform: scaleX(0);
        }
        .banner-line.top { top: 15px; animation: expandLine 0.5s 0.2s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .banner-line.bottom { bottom: 15px; animation: expandLine 0.5s 0.2s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* Subtle grid overlay for texture */
        .banner-grid {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 1;
        }

        .match-text {
            position: relative;
            z-index: 2;
            font-family: 'Tungsten', sans-serif;
            font-size: 150px;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 15px;
            opacity: 0;
            transform: scale(2);
            /* Slams in, then continuously glitches */
            animation: slamText 0.3s 0.3s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275), continuousGlitch 2.5s 0.6s infinite;
        }

        /* Full Screen Impact Flash */
        #impact-flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            opacity: 0;
            pointer-events: none;
            z-index: 25;
        }

        /* Darkness Transition */
        #darkness {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            opacity: 0;
            pointer-events: none;
            z-index: 30;
            transition: opacity 1.5s ease-in-out;
        }

        /* Video Screen */
        #video-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            display: none;
            z-index: 40;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Teaser Box */
        #teaser-box {
            position: absolute;
            top: 50px;
            right: -300px;
            background-color: rgba(15, 25, 35, 0.9);
            border-left: 5px solid #ff4655;
            padding: 20px 40px;
            font-family: 'Tungsten', sans-serif;
            font-size: 40px;
            letter-spacing: 3px;
            color: white;
            z-index: 50;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            transition: right 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Lightning Flash Overlay */
        #lightning-flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: white;
            opacity: 0;
            pointer-events: none;
            z-index: 60;
        }

        /* Keyframes */
        @keyframes expandBanner {
            0% { transform: scaleY(0); }
            100% { transform: scaleY(1); }
        }

        @keyframes expandLine {
            0% { transform: scaleX(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: scaleX(1); opacity: 0.8; }
        }

        @keyframes slamText {
            0% { opacity: 0; transform: scale(2); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0px); }
        }

        @keyframes explodeFlash {
            0% { opacity: 0; }
            10% { opacity: 1; }
            100% { opacity: 0; }
        }

        @keyframes continuousGlitch {
            0%, 100% { text-shadow: 4px 0px 0px rgba(0, 255, 255, 0.5), -4px 0px 0px rgba(255, 0, 0, 0.5), 0 0 40px rgba(255, 255, 255, 0.8); transform: translate(0,0); }
            5% { text-shadow: -6px 0px 0px rgba(0, 255, 255, 0.9), 6px 0px 0px rgba(255, 0, 0, 0.9), 0 0 60px rgba(255, 70, 85, 1); transform: translate(-4px, 2px); }
            10% { text-shadow: 4px 0px 0px rgba(0, 255, 255, 0.5), -4px 0px 0px rgba(255, 0, 0, 0.5), 0 0 40px rgba(255, 255, 255, 0.8); transform: translate(3px, -2px); }
            15% { transform: translate(0,0); }
        }

        @keyframes lightningStrike {
            0% { opacity: 0; }
            10% { opacity: 1; }
            20% { opacity: 0; }
            30% { opacity: 0.8; }
            100% { opacity: 0; }
        }

        @keyframes electricShake {
            0% { transform: translate(0, 0) skew(0deg); box-shadow: 0 0 20px #fff; }
            20% { transform: translate(-10px, 5px) skew(-10deg); box-shadow: 0 0 50px #00ffcc; background-color: white; color: black; }
            40% { transform: translate(10px, -5px) skew(10deg); box-shadow: 0 0 20px #00ffcc; background-color: white; color: black; }
            60% { transform: translate(-5px, 5px) skew(-5deg); box-shadow: 0 0 40px #fff; }
            80% { transform: translate(5px, -5px) skew(5deg); }
            100% { transform: translate(0, 0) skew(0deg); box-shadow: 0 0 20px rgba(0,255,204,0.8); }
        }

        .electric-shake {
            animation: electricShake 0.4s ease-out forwards;
        }
        
        .lightning-active {
            animation: lightningStrike 0.3s ease-out forwards;
        }

        .impact-active {
            animation: explodeFlash 0.7s ease-out forwards;
        }
    </style>
</head>
<body>

    <div id="pre-screen">
        <button class="btn" onclick="startSequence()">Enter Queue</button>
    </div>

    <div id="countdown-container">00:05</div>

    <div id="match-found-screen">
        <div id="impact-flash"></div>
        <div class="match-banner">
            <div class="banner-grid"></div>
            <div class="banner-line top"></div>
            <div class="banner-line bottom"></div>
            <div class="match-text">Anarchy SMP</div>
        </div>
    </div>

    <div id="darkness"></div>

    <div id="video-screen">
        <video id="teaser-video" src="media/0207.mp4" playsinline></video>
        <div id="teaser-box">
            <span id="teaser-text">#Teaser 1</span>
        </div>
        <div id="lightning-flash"></div>
    </div>

    <audio id="match-sound" src="media/match.mp3" preload="auto"></audio>
    
    <script>
        let countdownTime = 5; 
        const videoElement = document.getElementById('teaser-video');
        let teaserUpdated = false;

        function startSequence() {
            document.getElementById('pre-screen').style.display = 'none';
            document.getElementById('countdown-container').style.display = 'block';

            // Request Fullscreen
            let elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen();
            }

            // Start Countdown Loop
            let timer = setInterval(() => {
                countdownTime--;
                document.getElementById('countdown-container').innerText = `00:0${countdownTime}`;
                
                if (countdownTime <= 0) {
                    clearInterval(timer);
                    triggerMatchFound();
                }
            }, 1000);
        }

        function triggerMatchFound() {
            document.getElementById('countdown-container').style.display = 'none';
            document.getElementById('match-found-screen').style.display = 'flex';
            
            // Play Local Audio
            let audio = document.getElementById('match-sound');
            audio.play().catch(e => console.log("Audio playback blocked, but sequence continues."));

            // Trigger the white impact flash precisely when the text drops (300ms in)
            setTimeout(() => {
                document.getElementById('impact-flash').classList.add('impact-active');
            }, 300);

            // After 3 seconds, fade to black
            setTimeout(() => {
                document.getElementById('darkness').style.opacity = '1';
                
                // Once screen is completely black (1.5s transition), show video
                setTimeout(() => {
                    playVideoSequence();
                }, 1500);

            }, 3000);
        }

        function playVideoSequence() {
            document.getElementById('match-found-screen').style.display = 'none';
            document.getElementById('video-screen').style.display = 'block';
            
            // Play the local video
            videoElement.load();
            videoElement.play().catch(error => {
                console.error("Video play failed:", error);
                // Fallback: If the browser blocks it, mute it and try again
                videoElement.muted = true;
                videoElement.play();
            });
            
            document.getElementById('darkness').style.opacity = '0';

            // Slide in Teaser Box initially
            setTimeout(() => {
                document.getElementById('teaser-box').style.right = '50px';
            }, 1000);
        }

        // Listen to the video's time to trigger the lightning effect exactly at 0:57
        videoElement.addEventListener('timeupdate', () => {
            if (videoElement.currentTime >= 57 && !teaserUpdated) {
                teaserUpdated = true;
                triggerLightningTransition();
            }
        });

        function triggerLightningTransition() {
            const flash = document.getElementById('lightning-flash');
            const box = document.getElementById('teaser-box');
            const text = document.getElementById('teaser-text');

            // Trigger full screen lightning flash
            flash.classList.add('lightning-active');

            // At the peak of the flash, swap the text and animate the box
            setTimeout(() => {
                text.innerText = '#Teaser 2';
                box.style.borderLeftColor = '#00ffcc'; 
                box.classList.add('electric-shake');
            }, 100);
        }
    </script>
</body>
</html>
